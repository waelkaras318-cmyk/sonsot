<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صناعة البطاقة الاجتماعية</title>
    <style>
        body { font-family: sans-serif; background: #1e293b; color: white; text-align: center; padding: 20px; }
        .creator-box { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; width: 350px; margin: 0 auto; border: 1px solid gold; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border-radius: 8px; border: none; }
        .social-id-display { font-size: 24px; color: #fbbf24; font-weight: bold; margin: 20px 0; background: #000; padding: 10px; border-radius: 10px; }
        .btn-generate { background: #3b82f6; color: white; cursor: pointer; border: none; padding: 10px 20px; border-radius: 8px; }
        /* زرار "تمام" الذهبي */
        .btn-tamam { 
            background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728); 
            color: #1e3a8a; font-weight: bold; cursor: pointer; border: none; 
            padding: 15px 30px; border-radius: 10px; margin-top: 20px; width: 100%; font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="creator-box">
        <h2>إصدار هوية جديدة</h2>
        
        <input type="text" id="name-input" placeholder="الاسم بالكامل">
        
        <select id="gender-input">
            <option value="ذكر">ذكر</option>
            <option value="أنثى">أنثى</option>
        </select>

        <label style="display:block; margin-top:10px;">تاريخ الميلاد:</label>
        <input type="date" id="dob-input">

        <button class="btn-generate" onclick="generateNumber()">توليد رقم اجتماعي</button>
        
        <div class="social-id-display" id="social-id">0000000000</div>

        <button class="btn-tamam" onclick="saveAndGoToLogin()">تـمـام</button>
    </div>

    <script>
        // دالة توليد الرقم الـ 10 أرقام
        function generateNumber() {
            let num = Math.floor(Math.random() * 9000000000) + 1000000000;
            document.getElementById('social-id').innerText = num;
        }

        // دالة "تمام" - حفظ البيانات والنقل
        function saveAndGoToLogin() {
            const name = document.getElementById('name-input').value;
            const gender = document.getElementById('gender-input').value;
            const dob = document.getElementById('dob-input').value;
            const id = document.getElementById('social-id').innerText;

            if(name === "" || dob === "" || id === "0000000000") {
                alert("يا صاحبي كمل بيانات الملوخية (الاسم والتاريخ والرقم) الأول!");
                return;
            }

            // حفظ كل البيانات في "مخزن" المتصفح
            const userData = {
                name: name,
                gender: gender,
                dob: dob,
                socialID: id
            };
            localStorage.setItem('mySocialAccount', JSON.stringify(userData));

            alert("تم حفظ بياناتك! رقمك هو: " + id + "\nسيتم نقلك لصفحة الدخول.");
            
            // النقل لصفحة تسجيل الدخول (الملف الثاني)
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
