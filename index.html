<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المنصة الوطنية للبطاقة الاجتماعية</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3064842182212605"
     crossorigin="anonymous"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding: 20px; }
        .hero { padding: 40px 20px; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); border-bottom: 2px solid #fbbf24; margin-bottom: 30px; }
        .box { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; width: 380px; margin: 0 auto; border: 1px solid #fbbf24; }
        .camera-circle { width: 150px; height: 150px; border-radius: 50%; border: 3px solid #fbbf24; margin: 0 auto 15px; overflow: hidden; background: #000; }
        video, img { width: 100%; height: 100%; object-fit: cover; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #1e293b; color: white; text-align: center; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px 0; }
        .btn-gold { background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728); color: #1e3a8a; font-size: 18px; }
        .ad-space { margin: 20px 0; min-height: 90px; background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; border: 1px dashed #444; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>المنصة الذكية للهوية الاجتماعية</h1>
        <p>نظام التحقق البيومتري الأول لربط المواقع عبر الـ API</p>
    </div>

    <div class="ad-space">
        <p style="color:gray; font-size:12px;">إعلان</p>
    </div>

    <div class="box">
        <div class="camera-circle">
            <video id="v" autoplay playsinline></video>
            <img id="p" style="display:none;">
        </div>
        <button class="btn" style="background:#10b981; color:white;" onclick="start()">1. فتح الكاميرا</button>
        <button class="btn" style="background:#3b82f6; color:white;" onclick="snap()">2. التقاط صورة الهوية</button>
        
        <input type="text" id="name" placeholder="الاسم الكامل للمستخدم">
        <input type="date" id="dob">
        <button class="btn" style="background:#6366f1; color:white;" onclick="gen()">3. توليد الرقم السري</button>
        <div id="res" style="font-size: 24px; color: #fbbf24; margin: 10px;">0000000000</div>
        
        <button class="btn btn-gold" onclick="save()">إصدار البطاقة الآن</button>
    </div>

    <footer style="margin-top: 50px; padding: 20px; background: rgba(0,0,0,0.2); font-size: 14px;">
        <p>جميع الحقوق محفوظة لمنصة الهوية الاجتماعية ©️ 2026</p>
        <a href="./privacy.html" style="color: #fbbf24; text-decoration: none; border-bottom: 1px dashed;">إضغط هنا لقراءة سياسة الخصوصية وأمان الكاميرا</a>
    </footer>

    <canvas id="c" style="display:none;"></canvas>

    <script>
        let v = document.getElementById('v'), p = document.getElementById('p'), c = document.getElementById('c');
        async function start() { const s = await navigator.mediaDevices.getUserMedia({video:true}); v.srcObject = s; }
        function snap() { c.width = v.videoWidth; c.height = v.videoHeight; c.getContext('2d').drawImage(v,0,0); p.src = c.toDataURL('image/png'); p.style.display='block'; v.style.display='none'; }
        function gen() { document.getElementById('res').innerText = Math.floor(Math.random()*9000000000)+1000000000; }
        function save() {
            const data = { name: document.getElementById('name').value, dob: document.getElementById('dob').value, id: document.getElementById('res').innerText, img: p.src };
            if(!data.name || !data.dob || data.id === "0000000000") return alert("برجاء إكمال البيانات وصورة الوش!");
            localStorage.setItem('userAccount', JSON.stringify(data));
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
